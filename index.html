<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Real-AI Edition</title>
    <style>
        :root {
            --gemini-bg: #131314;
            --gemini-surface: #1e1f20;
            --gemini-text: #e3e3e3;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
        }

        body {
            background-color: var(--gemini-bg);
            color: var(--gemini-text);
            font-family: 'Google Sans', Arial, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo span { background: var(--gemini-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; font-size: 24px; }
        .user-id { border: 1px solid #444; padding: 5px 15px; border-radius: 20px; font-size: 12px; color: #888; }

        .workspace {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .welcome-text {
            font-size: 28px; margin-top: 40px; margin-bottom: 20px; text-align: center;
            background: var(--gemini-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 500; width: 100%;
        }

        #response-area {
            max-width: 700px; line-height: 1.7; color: #e3e3e3;
            font-size: 16px; margin-top: 10px; word-wrap: break-word;
            padding-bottom: 100px;
        }

        /* 🪄 AI Thinking Animation */
        .shimmer {
            display: none; width: 100%; max-width: 600px; height: 10px;
            margin: 20px 0; border-radius: 5px;
            background: linear-gradient(90deg, #1e1f20 25%, #2a2b2c 50%, #1e1f20 75%);
            background-size: 200% 100%; animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 💊 Input Area Fix */
        .footer-container { padding: 20px; background: linear-gradient(transparent, var(--gemini-bg) 50%); position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .input-pill {
            width: 100%; max-width: 700px; background: var(--gemini-surface);
            border-radius: 30px; padding: 10px 18px;
            display: flex; align-items: center; gap: 12px; margin: auto;
            border: 1px solid #3c4043; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 16px; outline: none; }
        .send-btn { background: #fff; color: #000; width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>Jarvis AI</span></div>
        <div class="user-id">VIVEK RAI • ONLINE</div>
    </header>

    <div class="workspace">
        <div id="welcome-header" class="welcome-text">नमस्ते विवेक, मैं आपकी क्या मदद करूँ?</div>
        <div id="loading-bar" class="shimmer"></div>
        <div id="response-area"></div>
    </div>

    <div class="footer-container">
        <div class="input-pill">
            <span style="color:#888; font-size:24px; cursor:pointer;">+</span>
            <input type="text" id="main-prompt" placeholder="Ask Jarvis anything...">
            <button class="send-btn" onclick="askJarvis()">➔</button>
        </div>
    </div>

<script>
    // 🔑 THE REAL ENGINE KEY (Gemini API)
    const p1 = "AIzaSyABN_K"; const p2 = "4jNO2l4rZ6jFCL"; const p3 = "HgW4ngCuZuPOT0";
    const API_KEY = p1 + p2 + p3;

    async function askJarvis() {
        const inputField = document.getElementById('main-prompt');
        const respArea = document.getElementById('response-area');
        const loader = document.getElementById('loading-bar');
        const welcome = document.getElementById('welcome-header');
        
        const userInput = inputField.value.trim();
        if(!userInput) return;

        // UI Reset
        welcome.style.fontSize = "20px";
        welcome.innerText = "Query: " + userInput;
        respArea.innerText = "";
        loader.style.display = 'block';
        inputField.value = "";

        try {
            // 🚀 Fetching Real AI Response
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userInput }] }]
                })
            });

            const data = await response.json();
            const aiReply = data.candidates[0].content.parts[0].text;

            // Stop loading & Start Typing Effect
            loader.style.display = 'none';
            typeEffect(aiReply, respArea);

        } catch (error) {
            loader.style.display = 'none';
            respArea.innerText = "Commander, something went wrong with the neural link. Check internet.";
        }
    }

    function typeEffect(text, container) {
        let i = 0;
        container.innerText = "";
        const interval = setInterval(() => {
            container.innerText += text[i];
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                // Voice Feedback
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(text.substring(0, 100)));
            }
        }, 20);
    }

    // Enter Key Support
    document.getElementById("main-prompt").addEventListener("keypress", (e) => {
        if (e.key === "Enter") askJarvis();
    });
</script>

</body>
</html>
