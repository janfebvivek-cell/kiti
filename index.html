<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Official Fix</title>
    <style>
        :root { --bg: #131314; --panel: #1e1f20; --gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); }
        body { background: var(--bg); color: #e3e3e3; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid #333; text-align: center; font-weight: bold; background: var(--bg); }
        .workspace { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #res-area { max-width: 600px; margin-top: 20px; line-height: 1.6; text-align: center; font-size: 17px; }
        .pill-box { padding: 20px; background: var(--bg); display: flex; justify-content: center; }
        .pill { width: 90%; max-width: 700px; background: var(--panel); border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .btn { background: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 18px; }
        .loader { display: none; width: 50px; height: 4px; background: var(--gradient); margin: 20px; border-radius: 10px; animation: w 1s infinite; }
        @keyframes w { 0% { width: 10px; } 100% { width: 100px; } }
    </style>
</head>
<body>

    <header><span style="background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">JARVIS 2.0</span></header>

    <div class="workspace">
        <div id="loader" class="loader"></div>
        <div id="res-area">नमस्ते विवेक, मैं ऑनलाइन हूँ। कुछ भी पूछें।</div>
    </div>

    <div class="pill-box">
        <div class="pill">
            <input type="text" id="in" placeholder="यहाँ पूछें...">
            <button class="btn" onclick="run()">➔</button>
        </div>
    </div>

<script>
    // ✅ आपकी अपनी API Key
    const KEY = "AIzaSyCufXP9Zr0sWBz0Idwk7A2Vyc7X6vO_GZU";

    async function run() {
        const input = document.getElementById('in').value;
        const res = document.getElementById('res-area');
        const load = document.getElementById('loader');

        if(!input) return;
        res.innerText = "";
        load.style.display = 'block';

        try {
            // 🚀 Gemini 1.5 Flash - सबसे तेज़ और फ्री
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "तुम विवेक के AI हो। हिंदी में जवाब दो: " + input }] }] })
            });

            const data = await response.json();
            load.style.display = 'none';

            if(data.candidates) {
                let txt = data.candidates[0].content.parts[0].text;
                let i = 0;
                const type = setInterval(() => {
                    res.innerText += txt[i];
                    i++;
                    if(i >= txt.length) {
                        clearInterval(type);
                        window.speechSynthesis.speak(new SpeechSynthesisUtterance(txt));
                    }
                }, 30);
            } else {
                res.innerText = "सर्वर एरर! शायद API की लिमिट पूरी हो गई है या की अभी एक्टिव नहीं हुई है।";
            }
        } catch(e) {
            load.style.display = 'none';
            res.innerText = "कनेक्शन फेल! कृपया 5 मिनट बाद कोशिश करें।";
        }
        document.getElementById('in').value = "";
    }
</script>
</body>
</html>
