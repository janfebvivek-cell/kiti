<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS x GEMINI | MATERIAL 3</title>
    <style>
        /* 🎨 MATERIAL 3 DESIGN TOKENS */
        :root {
            --gemini-bg: #131314;       /* Deep Space Gray */
            --gemini-surface: #1e1f20;  /* Surface Container */
            --gemini-text: #e3e3e3;
            --gemini-blue: #8ab4f8;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --pill-radius: 28px;
        }

        body {
            background-color: var(--gemini-bg);
            color: var(--gemini-text);
            font-family: 'Google Sans', Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
        }

        /* ✨ HEADER: Minimalist & Personal */
        header {
            padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 500; letter-spacing: -0.5px; }
        .logo span { background: var(--gemini-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .profile { width: 32px; height: 32px; border-radius: 50%; background: #333; border: 1px solid #444; }

        /* 💬 WORKSPACE: Central Focus */
        .workspace {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .welcome-text {
            font-size: 32px; margin-top: 10vh; text-align: center;
            background: var(--gemini-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 500; max-width: 600px;
        }

        /* 🪄 SHIMMER EFFECT (Skeleton State) */
        .shimmer {
            display: none; width: 100%; max-width: 600px; height: 20px;
            margin-top: 20px; border-radius: 4px;
            background: linear-gradient(90deg, #1e1f20 25%, #2a2b2c 50%, #1e1f20 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* 💊 THE INPUT PILL (Multi-modal Hub) */
        .footer-container {
            padding: 20px; display: flex; justify-content: center;
            background: linear-gradient(to top, var(--gemini-bg) 80%, transparent);
        }
        .input-pill {
            width: 100%; max-width: 760px; background: var(--gemini-surface);
            border-radius: var(--pill-radius); padding: 8px 16px;
            display: flex; align-items: center; gap: 12px;
            border: 1px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-pill:focus-within {
            background: #28292a; border-color: #3c4043;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15);
        }
        
        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px 8px; font-size: 16px; outline: none;
        }
        .icon-btn {
            color: #c4c7c5; cursor: pointer; padding: 8px; border-radius: 50%;
            transition: background 0.2s; font-size: 20px;
        }
        .icon-btn:hover { background: #333; color: white; }

        /* 🚀 Action Button */
        .send-btn {
            background: #e3e3e3; color: #131314; width: 40px; height: 40px;
            border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: transform 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); background: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>Jarvis</span></div>
        <div class="profile" title="Vivek Rai"></div>
    </header>

    <div class="workspace">
        <div class="welcome-text">नमस्ते विवेक, मैं आज आपकी कैसे सहायता कर सकता हूँ?</div>
        <div id="loading-bar" class="shimmer"></div>
        <div id="response-area" style="margin-top: 30px; max-width: 600px; line-height: 1.6; color: #c4c7c5;"></div>
    </div>

    <div class="footer-container">
        <div class="input-pill">
            <div class="icon-btn" title="Add Image">➕</div>
            <input type="text" id="main-prompt" placeholder="यहाँ कुछ भी पूछें...">
            <div class="icon-btn" title="Voice Search">🎤</div>
            <button class="send-btn" onclick="triggerJarvis()">➔</button>
        </div>
    </div>

<script>
    function triggerJarvis() {
        const input = document.getElementById('main-prompt').value;
        if(!input) return;

        // Skeleton state ON
        document.getElementById('loading-bar').style.display = 'block';
        document.getElementById('response-area').innerText = "";
        
        // Simulate "Streaming" response
        setTimeout(() => {
            document.getElementById('loading-bar').style.display = 'none';
            const text = "Commander Vivek, your request for '" + input + "' is being processed by the 1-Lakh agent network...";
            let i = 0;
            const timer = setInterval(() => {
                document.getElementById('response-area').innerText += text[i];
                i++;
                if(i >= text.length) clearInterval(timer);
            }, 30); // Typing effect (UX Choice)
            
            document.getElementById('main-prompt').value = "";
        }, 1500);
    }
</script>

</body>
</html>
